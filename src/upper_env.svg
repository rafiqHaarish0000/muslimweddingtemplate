<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMax meet" style="width:100%;height:100%;display:block;">
  <defs>
    <linearGradient id="envGradTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f05"/>
      <stop offset="100%" stop-color="#2c1a08"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d078"/>
      <stop offset="50%" stop-color="#c8973a"/>
      <stop offset="100%" stop-color="#a07020"/>
    </linearGradient>
    <linearGradient id="creamFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7eedc"/>
      <stop offset="100%" stop-color="#ede0c4"/>
    </linearGradient>
    <filter id="soft">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur"/>
    </filter>
  </defs>

  <!-- Main envelope body (top half) -->
  <polygon points="0,0 800,0 800,400 400,200 0,400" fill="url(#envGradTop)"/>

  <!-- Cream inner surface showing as flap opens -->
  <polygon points="0,0 800,0 400,220 " fill="url(#creamFill)" opacity="0.08"/>

  <!-- Gold border along top and sides -->
  <polyline points="4,4 796,4 796,398" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>
  <polyline points="4,4 4,398" fill="none" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Diagonal flap fold lines -->
  <line x1="0" y1="0" x2="400" y2="200" stroke="#c8973a" stroke-width="1" opacity="0.4"/>
  <line x1="800" y1="0" x2="400" y2="200" stroke="#c8973a" stroke-width="1" opacity="0.4"/>

  <!-- Gold ornamental border strip at fold edge -->
  <g opacity="0.85">
    <!-- Zigzag fold line ornament -->
    <polyline points="0,400 40,370 80,400 120,360 160,400 200,360 240,400 280,365 320,400 360,370 400,200 440,370 480,400 520,365 560,400 600,360 640,400 680,360 720,400 760,370 800,400"
      fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Top center arch ornament -->
  <g transform="translate(400,30)">
    <!-- Central arch -->
    <path d="M-60,0 Q-60,-40 0,-50 Q60,-40 60,0" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <!-- Inner arch -->
    <path d="M-40,0 Q-40,-28 0,-36 Q40,-28 40,0" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
    <!-- Crown tip -->
    <polygon points="0,-52 -4,-44 4,-44" fill="#c8973a"/>
    <!-- Side finials -->
    <circle cx="-60" cy="0" r="3" fill="#c8973a"/>
    <circle cx="60" cy="0" r="3" fill="#c8973a"/>
    <!-- Horizontal bar -->
    <line x1="-80" y1="0" x2="80" y2="0" stroke="url(#goldGrad)" stroke-width="1"/>
    <!-- Small diamonds -->
    <polygon points="-70,0 -66,-3 -62,0 -66,3" fill="#c8973a" opacity="0.9"/>
    <polygon points="62,0 66,-3 70,0 66,3" fill="#c8973a" opacity="0.9"/>
  </g>

  <!-- Left corner ornament -->
  <g transform="translate(60,40)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#c8973a" stroke-width="0.8"/>
    <!-- 4-petal flower -->
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#c8973a" opacity="0.7"/>
    <ellipse cx="0" cy="8" rx="3" ry="6" fill="#c8973a" opacity="0.7"/>
    <ellipse cx="-8" cy="0" rx="6" ry="3" fill="#c8973a" opacity="0.7"/>
    <ellipse cx="8" cy="0" rx="6" ry="3" fill="#c8973a" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#d4a840"/>
    <!-- Corner lines -->
    <line x1="-24" y1="0" x2="-20" y2="0" stroke="#c8973a" stroke-width="1"/>
    <line x1="20" y1="0" x2="24" y2="0" stroke="#c8973a" stroke-width="1"/>
    <line x1="0" y1="-24" x2="0" y2="-20" stroke="#c8973a" stroke-width="1"/>
    <line x1="0" y1="20" x2="0" y2="24" stroke="#c8973a" stroke-width="1"/>
  </g>

  <!-- Right corner ornament (mirror) -->
  <g transform="translate(740,40)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <circle cx="0" cy="0" r="10" fill="none" stroke="#c8973a" stroke-width="0.8"/>
    <ellipse cx="0" cy="-8" rx="3" ry="6" fill="#c8973a" opacity="0.7"/>
    <ellipse cx="0" cy="8" rx="3" ry="6" fill="#c8973a" opacity="0.7"/>
    <ellipse cx="-8" cy="0" rx="6" ry="3" fill="#c8973a" opacity="0.7"/>
    <ellipse cx="8" cy="0" rx="6" ry="3" fill="#c8973a" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="#d4a840"/>
    <line x1="-24" y1="0" x2="-20" y2="0" stroke="#c8973a" stroke-width="1"/>
    <line x1="20" y1="0" x2="24" y2="0" stroke="#c8973a" stroke-width="1"/>
    <line x1="0" y1="-24" x2="0" y2="-20" stroke="#c8973a" stroke-width="1"/>
    <line x1="0" y1="20" x2="0" y2="24" stroke="#c8973a" stroke-width="1"/>
  </g>

  <!-- Arabesque vine border left -->
  <g opacity="0.55" stroke="url(#goldGrad)" fill="none" stroke-width="1">
    <path d="M30,80 Q40,100 30,120 Q20,140 30,160 Q40,180 30,200 Q20,220 30,240 Q40,260 30,280 Q20,300 30,320 Q40,340 30,360"/>
    <path d="M20,100 Q35,110 25,130"/>
    <path d="M20,160 Q35,170 25,190"/>
    <path d="M20,220 Q35,230 25,250"/>
    <path d="M20,280 Q35,290 25,310"/>
    <!-- Leaf accents -->
    <ellipse cx="14" cy="115" rx="6" ry="10" transform="rotate(-30,14,115)" fill="#c8973a" fill-opacity="0.4" stroke="none"/>
    <ellipse cx="14" cy="175" rx="6" ry="10" transform="rotate(-30,14,175)" fill="#c8973a" fill-opacity="0.4" stroke="none"/>
    <ellipse cx="14" cy="235" rx="6" ry="10" transform="rotate(-30,14,235)" fill="#c8973a" fill-opacity="0.4" stroke="none"/>
    <ellipse cx="14" cy="295" rx="6" ry="10" transform="rotate(-30,14,295)" fill="#c8973a" fill-opacity="0.4" stroke="none"/>
  </g>

  <!-- Arabesque vine border right (mirror) -->
  <g opacity="0.55" stroke="url(#goldGrad)" fill="none" stroke-width="1">
    <path d="M770,80 Q760,100 770,120 Q780,140 770,160 Q760,180 770,200 Q780,220 770,240 Q760,260 770,280 Q780,300 770,320 Q760,340 770,360"/>
    <path d="M780,100 Q765,110 775,130"/>
    <path d="M780,160 Q765,170 775,190"/>
    <path d="M780,220 Q765,230 775,250"/>
    <path d="M780,280 Q765,290 775,310"/>
    <ellipse cx="786" cy="115" rx="6" ry="10" transform="rotate(30,786,115)" fill="#c8973a" fill-opacity="0.4" stroke="none"/>
    <ellipse cx="786" cy="175" rx="6" ry="10" transform="rotate(30,786,175)" fill="#c8973a" fill-opacity="0.4" stroke="none"/>
    <ellipse cx="786" cy="235" rx="6" ry="10" transform="rotate(30,786,235)" fill="#c8973a" fill-opacity="0.4" stroke="none"/>
    <ellipse cx="786" cy="295" rx="6" ry="10" transform="rotate(30,786,295)" fill="#c8973a" fill-opacity="0.4" stroke="none"/>
  </g>

  <!-- Top horizontal ornament strip -->
  <g transform="translate(400, 10)" opacity="0.7">
    <line x1="-300" y1="0" x2="-90" y2="0" stroke="url(#goldGrad)" stroke-width="0.8"/>
    <line x1="90" y1="0" x2="300" y2="0" stroke="url(#goldGrad)" stroke-width="0.8"/>
    <!-- Diamond chain left -->
    <g fill="#c8973a">
      <polygon points="-120,0 -112,-4 -104,0 -112,4"/>
      <polygon points="-148,0 -140,-4 -132,0 -140,4"/>
      <polygon points="-176,0 -168,-4 -160,0 -168,4"/>
      <polygon points="-204,0 -196,-4 -188,0 -196,4"/>
      <polygon points="-232,0 -224,-4 -216,0 -224,4"/>
      <polygon points="-260,0 -252,-4 -244,0 -252,4"/>
    </g>
    <!-- Diamond chain right -->
    <g fill="#c8973a">
      <polygon points="104,0 112,-4 120,0 112,4"/>
      <polygon points="132,0 140,-4 148,0 140,4"/>
      <polygon points="160,0 168,-4 176,0 168,4"/>
      <polygon points="188,0 196,-4 204,0 196,4"/>
      <polygon points="216,0 224,-4 232,0 224,4"/>
      <polygon points="244,0 252,-4 260,0 252,4"/>
    </g>
  </g>

  <!-- Subtle star pattern fill - top area -->
  <g opacity="0.08" fill="#d4a840">
    <polygon points="200,60 203,70 213,70 205,76 208,86 200,80 192,86 195,76 187,70 197,70"/>
    <polygon points="600,60 603,70 613,70 605,76 608,86 600,80 592,86 595,76 587,70 597,70"/>
    <polygon points="400,80 402,88 410,88 404,93 406,101 400,96 394,101 396,93 390,88 398,88"/>
    <polygon points="300,50 302,58 310,58 304,63 306,71 300,66 294,71 296,63 290,58 298,58"/>
    <polygon points="500,50 502,58 510,58 504,63 506,71 500,66 494,71 496,63 490,58 498,58"/>
  </g>
</svg>
